name: update

on:
  workflow_dispatch:
    inputs:
      path:
        description: Data path
        required: false
        default: data/

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Checkout MDN
        run: |
          git clone --no-checkout --depth=1 --filter=tree:0 git@github.com:mdn/content.git data
          cd data
          git sparse-checkout set --no-cone --stdin < ../scripts/ingest.txt
          git checkout
          ls -1 files/en-us/web/

      - name: Ingest
        env:
          MDN_DATASET_PATH: ./db/data/
        run: |
          time bun src/index.ts download
          time bun ingest "${{ inputs.path }}"
          du -sh --apparent-size db/

      - name: Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          bun scripts/upload.ts db/
